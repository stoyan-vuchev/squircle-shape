name: Deploy Wasm/Compose Web to GitHub Pages

on:
  push:
    branches: [ demo-app ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Stop unnecessary daemons
        run: ./gradlew --stop || true

      - name: Build WasmJS production distribution
        run: ./gradlew :composeApp:wasmJsBrowserDevelopmentExecutableDistribution --no-daemon
        env:
          ORG_GRADLE_JVMARGS: "-Xmx3g -Xms1g -XX:MaxMetaspaceSize=512m"
          KOTLIN_DAEMON_JVMARGS: "-Xmx2500m -Xms512m"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: composeApp/build/dist/wasmJs/productionExecutable
          name: github-pages-${{ github.run_id }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}
